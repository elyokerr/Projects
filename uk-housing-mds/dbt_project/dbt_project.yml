name: 'uk_housing_mds'
version: '1.0.0'
config-version: 2
profile: 'uk_housing_mds'
model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
clean-targets: ["target", "dbt_packages"]
models:
  uk_housing_mds:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      core:
        +materialized: table
        fct_transactions:
          +materialized: incremental
          +unique_key: 'transaction_unique_id'
          +on_schema_change: 'fail'
      analytics:
        +materialized: table
