version: 2
sources:
  - name: raw
    description: "Landed-as-is from upstream sources"
    tables:
      - name: ppd
        description: "HM Land Registry Price Paid Data"
        columns:
          - name: transaction_unique_id
            tests: [unique, not_null]
      - name: nspl
        description: "ONS National Statistics Postcode Lookup"
        columns:
          - name: pcd
            tests: [not_null]
      - name: hpi
        description: "UK House Price Index"
