<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Gap Analyser</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2uPlA5WcVmqXOMYMh1h1CVxXgMRtb9s7Ro" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-2xl mx-auto p-4">

    <!-- Header -->
    <div class="mt-8 mb-6 text-center">
      <h1 class="text-3xl font-bold text-gray-900">Career Gap Analyser</h1>
      <p class="mt-2 text-gray-500 text-sm">
        Find out which skills are missing from your CV for your target career role.
      </p>
    </div>

    <!-- Form card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
      <form
        hx-post="/analyze"
        hx-target="#report"
        hx-encoding="multipart/form-data"
        hx-indicator="#spinner"
        class="space-y-5"
      >
        <!-- CV textarea -->
        <div>
          <label for="cv_text" class="block text-sm font-medium text-gray-700 mb-1">
            Paste your CV
          </label>
          <textarea
            id="cv_text"
            name="cv_text"
            rows="8"
            placeholder="Paste your CV / resume text here&#8230;"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-y"
          ></textarea>
        </div>

        <!-- PDF upload -->
        <div>
          <label for="cv_pdf" class="block text-sm font-medium text-gray-700 mb-1">
            Or upload a PDF CV
            <span class="text-gray-400 font-normal">(optional — overrides pasted text)</span>
          </label>
          <input
            id="cv_pdf"
            name="cv_pdf"
            type="file"
            accept=".pdf"
            class="w-full text-sm text-gray-600 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100"
          />
        </div>

        <!-- Role + Location row -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="role" class="block text-sm font-medium text-gray-700 mb-1">
              Target role
            </label>
            <input
              id="role"
              name="role"
              type="text"
              placeholder="e.g. Data Scientist"
              required
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
          </div>
          <div>
            <label for="location" class="block text-sm font-medium text-gray-700 mb-1">
              Location
            </label>
            <input
              id="location"
              name="location"
              type="text"
              placeholder="e.g. London"
              required
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
        >
          Analyse my career gaps
        </button>
      </form>
    </div>

    <!-- Spinner -->
    <div id="spinner" class="htmx-indicator mt-6 flex items-center justify-center gap-3 text-gray-500 text-sm">
      <svg class="animate-spin h-5 w-5 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
      </svg>
      Analysing your career profile&hellip; this may take up to a minute.
    </div>

    <!-- Report target (empty on load, populated by HTMX) -->
    <div id="report" class="mt-6"></div>

    <!-- Footer -->
    <p class="mt-10 mb-6 text-center text-xs text-gray-400">
      Powered by ESCO taxonomy &middot; LangGraph &middot; Adzuna live job data
    </p>

  </div>

</body>
</html>
