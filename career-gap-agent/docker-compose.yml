services:
  app:
    build: .
    ports:
      - "7860:7860"
    # All keys are optional. Without them the app boots and serves the form;
    # analysis needs a free GROQ_API_KEY or GOOGLE_API_KEY. Values are read from
    # the host environment (or a local .env loaded by your shell) and default to empty.
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - ADZUNA_APP_ID=${ADZUNA_APP_ID:-}
      - ADZUNA_APP_KEY=${ADZUNA_APP_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
