name: uk-energy-price-forecasting CI

on:
  push:
    branches: [main, "uk-energy-price-forecasting/**"]
    paths:
      - "uk-energy-price-forecasting/**"
      - ".github/workflows/uk-energy-price-forecasting-ci.yml"
  pull_request:
    paths:
      - "uk-energy-price-forecasting/**"
      - ".github/workflows/uk-energy-price-forecasting-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uk-energy-price-forecasting
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: ruff check src tests app
      - name: Test
        run: pytest tests -q
