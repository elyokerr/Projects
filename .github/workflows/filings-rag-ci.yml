name: filings-rag CI

on:
  push:
    branches: [main, "filings-rag/**"]
    paths:
      - "filings-rag/**"
      - ".github/workflows/filings-rag-ci.yml"
  pull_request:
    paths:
      - "filings-rag/**"
      - ".github/workflows/filings-rag-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: filings-rag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest tests -v
