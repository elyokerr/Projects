name: career-gap-agent CI

on:
  push:
    branches: [main, "career-gap-agent/**"]
    paths:
      - "career-gap-agent/**"
      - ".github/workflows/career-gap-agent-ci.yml"
  pull_request:
    paths:
      - "career-gap-agent/**"
      - ".github/workflows/career-gap-agent-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: career-gap-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: ruff check src tests app
      - name: Test
        run: pytest tests -v
