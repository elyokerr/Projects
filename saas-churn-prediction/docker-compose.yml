# Full-stack orchestration for the SaaS Churn Prediction platform.
#
# Quickstart:
#   docker compose up --build       # Start everything (DB, API, dashboard)
#   docker compose down             # Stop everything
#   docker compose down -v          # Stop and wipe the database volume
#
# Service URLs once running:
#   API:        http://localhost:8000/docs
#   Dashboard:  http://localhost:8501
#   Database:   localhost:5432

services:

  # PostgreSQL is the production-style backend. The API depends on it being
  # healthy before it tries to connect, which avoids a noisy startup race.
  postgres:
    image: postgres:16-alpine
    container_name: churn-postgres
    environment:
      POSTGRES_DB: saas_churn
      POSTGRES_USER: churn_user
      POSTGRES_PASSWORD: churn_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U churn_user -d saas_churn"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI prediction service. The lifespan handler in api/main.py loads
  # the trained model from /app/models at startup.
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: churn-api
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      USE_POSTGRES: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Streamlit dashboard. Reads scored_customers.csv and model metadata
  # directly from disk - no API dependency at runtime, though the API
  # health check sequences startup nicely.
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: churn-dashboard
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
