version: "3.9"

# ═══════════════════════════════════════════════════════════════
#  SaaS Churn Prediction — Full Stack
# ═══════════════════════════════════════════════════════════════
#  Start everything:  docker compose up --build
#  Stop everything:   docker compose down
#  Reset database:    docker compose down -v
#
#  Services:
#    - postgres:   PostgreSQL 16 database (port 5432)
#    - api:        FastAPI prediction service (port 8000)
#    - dashboard:  Streamlit interactive dashboard (port 8501)
# ═══════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: churn-postgres
    environment:
      POSTGRES_DB: saas_churn
      POSTGRES_USER: churn_user
      POSTGRES_PASSWORD: churn_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U churn_user -d saas_churn"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── FastAPI Prediction Service ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: churn-api
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      USE_POSTGRES: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Streamlit Dashboard ────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: churn-dashboard
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
