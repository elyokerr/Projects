# Ruff linter configuration.
# See https://docs.astral.sh/ruff/ for the full reference.

target-version = "py310"
line-length = 120
fix = true

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # import sorting
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # Line too long; line-length is configured above
    "E402",  # Module-level import not at top; needed for Colab path setup
]

[lint.isort]
known-first-party = ["src", "api"]
