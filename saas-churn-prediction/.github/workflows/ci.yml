name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r api/requirements.txt

      - name: Run ruff
        run: ruff check src/ api/ tests/

      - name: Verify model artifacts exist
        # The repo doesn't commit trained models. CI runs against the
        # training pipeline output produced by an upstream job in a real
        # deployment - here we just confirm the directory structure is sane.
        run: |
          mkdir -p models data/processed
          echo "Directories ready for tests."

      - name: Run test suite
        run: pytest tests/ -v --tb=short
