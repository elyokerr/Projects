name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      # ── Checkout code ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── Cache pip ──
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Install dependencies ──
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r api/requirements.txt
          pip install ruff pytest

      # ── Linting ──
      - name: Lint with Ruff
        run: |
          ruff check src/ api/ tests/ --output-format=github

      # ── Run API tests ──
      - name: Run API tests
        run: |
          python -m pytest tests/test_api.py -v --tb=short

      # ── Run data pipeline smoke test ──
      - name: Verify model artifacts exist
        run: |
          python -c "
          from pathlib import Path
          required = ['models/best_model.joblib', 'models/model_metadata.joblib', 'models/scaler.joblib']
          for f in required:
              p = Path(f)
              assert p.exists(), f'Missing: {f}'
              print(f'  ✓ {f} ({p.stat().st_size / 1024:.1f} KB)')
          print('All model artifacts present.')
          "
